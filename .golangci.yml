run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - noctx
    - errorlint

linters-settings:
  errorlint:
    errorf: true
    asserts: true
    comparison: true
  govet:
    enable:
      - shadow

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - unparam
        - noctx
  max-issues-per-linter: 0
  max-same-issues: 0
