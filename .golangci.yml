version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - noctx
    - errorlint
  settings:
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    govet:
      enable:
        - shadow
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - unparam
          - noctx

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
