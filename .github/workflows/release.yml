name: Release

# Go modules are published simply by pushing a semver-tagged commit to
# GitHub — there is no separate registry upload step. This workflow
# re-validates the module on the tagged commit (so a release can never
# ship code that fails tests/vet/lint), then creates a GitHub Release
# with notes, and warms the public Go module proxy / pkg.go.dev so the
# new version is immediately resolvable via `go get`.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write # required to create the GitHub Release

jobs:
  validate:
    name: Validate release (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Verify tag is valid SemVer
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$tag' is not a valid semantic version (expected vX.Y.Z)."
            exit 1
          fi

      - name: go mod verify
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./... -race -cover

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  release:
    name: Create GitHub Release
    needs: [validate, lint]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

      - name: Warm the Go module proxy
        # go get on any machine will trigger this anyway; doing it here
        # makes the new version resolvable immediately after release
        # instead of on whoever's first `go get`.
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          curl -fsSL "https://proxy.golang.org/github.com/taliffsss/unisms-go/@v/${tag}.info" || true
          curl -fsSL "https://sum.golang.org/lookup/github.com/taliffsss/unisms-go@${tag}" || true
